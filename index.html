	const Utils = {
	utoa: (text) => btoa(Array.from(new TextEncoder().encode(text)).map(b => String.fromCharCode(b)).join('')),
	atou: (b64) => new TextDecoder().decode(new Uint8Array(atob(b64.replace(/[\r\n]+/g, '')).split('').map(c => c.charCodeAt(0)))),
	isImageFile: (filename) => /\.(png|jpg|jpeg|gif|svg|webp|ico)$/i.test(filename || ''),
	isPdfFile: (filename) => /\.pdf$/i.test(filename || ''),
	isTextFile: (filename) => {
		// Files with no extension are usually text (e.g., Makefile, .env)
		if (!filename.includes('.')) return true; 
		// Add or remove extensions to this regex as needed
		return /\.(txt|md|markdown|rst|csv|json|xml|html|css|js|ts|jsx|tsx|py|yml|yaml|ini|env|sh|bat|ps1|c|cpp|h|rs|go|java|toml|sml)$/i.test(filename);
	},
	resolvePath: (basePath, relativePath) => {
		// Ignore external web links and base64 data URIs
		if (relativePath.match(/^(http|https|data:|mailto:|#)/i)) return relativePath;

		const stack = basePath.split('/').slice(0, -1); // Get current directory
		const parts = relativePath.split('/');

		for (const part of parts) {
			if (part === '.') continue;
			if (part === '..') stack.pop();
			else stack.push(part);
		}
		return stack.join('/');
	},
	parsePath: (path) => {
		const lastSlash = path.lastIndexOf('/');
		const dir = lastSlash === -1 ? '' : path.substring(0, lastSlash + 1);
		const filename = lastSlash === -1 ? path : path.substring(lastSlash + 1);
		const lastDot = filename.lastIndexOf('.');
		const basename = lastDot === -1 ? filename : filename.substring(0, lastDot);
		return { dir, filename, basename };
	},
	loadResource: (url, type = 'script') => {
		return new Promise((resolve, reject) => {
			// Don't load the same file twice
			if (document.querySelector(`[src="${url}"]`) || document.querySelector(`[href="${url}"]`)) return resolve();

			let el;
			if (type === 'script') {
				el = document.createElement('script');
				el.src = url;
			} else if (type === 'style') {
				el = document.createElement('link');
				el.rel = 'stylesheet';
				el.href = url;
			}
			el.onload = resolve;
			el.onerror = reject;
			document.head.appendChild(el);
		});
	},
	createStandardEditor: (content, saveCallback) => {
		const textarea = document.createElement('textarea');
		textarea.style.cssText = 'width: 100%; height: 100%; box-sizing: border-box; padding: 20px; border: none; resize: none; outline: none; font-family: monospace; font-size: 15px; line-height: 1.5;';
		textarea.value = typeof content === 'string' ? content : '';

		// Auto-save hook
		textarea.addEventListener('input', (e) => saveCallback(e.target.value));

		// Standard Tab key indentation
		textarea.addEventListener('keydown', function(e) {
			if (e.key === 'Tab') {
				e.preventDefault();
				const start = this.selectionStart, end = this.selectionEnd;
				this.value = this.value.substring(0, start) + "    " + this.value.substring(end);
				this.selectionStart = this.selectionEnd = start + 4;
				saveCallback(this.value);
			}
		});

		return textarea;
	},
	// PKCE Helper: Generates a cryptographically random string
	generateCodeVerifier: () => {
		const array = new Uint32Array(28);
		window.crypto.getRandomValues(array);
		return Array.from(array, dec => ('0' + dec.toString(16)).slice(-2)).join('');
	},

	// PKCE Helper: Hashes the verifier into a base64-url encoded challenge
	generateCodeChallenge: async (verifier) => {
		const encoder = new TextEncoder();
		const data = encoder.encode(verifier);
		const digest = await window.crypto.subtle.digest('SHA-256', data);
		return btoa(String.fromCharCode(...new Uint8Array(digest)))
			.replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
	},
	h: (tag, props, ...children) => {
		const el = document.createElement(tag);
		for (const key in props) {
			if (key.startsWith('on')) el.addEventListener(key.slice(2).toLowerCase(), props[key]);
			else el.setAttribute(key, props[key]);
		}
		children.forEach(c => typeof c === 'string' ? el.appendChild(document.createTextNode(c)) : el.appendChild(c));
		return el;
	},
};

	const DBService = {
	storeName: 'notes',
	// Dynamically read the database name for the active profile
	get dbName() {
		const ws = AppState.activeWorkspace;
		if (!ws) {
			throw new Error("No active profile. Database locked.");
		}
		return ws.dbName;
	},

	init() {
		return new Promise((resolve, reject) => {
			const request = indexedDB.open(this.dbName, 1);
			request.onupgradeneeded = (e) => {
				const db = e.target.result;
				if (!db.objectStoreNames.contains(this.storeName)) {
					db.createObjectStore(this.storeName, { keyPath: 'filename' });
				}
			};
			request.onsuccess = () => resolve(request.result);
			request.onerror = () => reject(request.error);
		});
	},
	async put(note) {
		const db = await this.init();
		return new Promise((resolve) => {
			const tx = db.transaction(this.storeName, 'readwrite');
			tx.objectStore(this.storeName).put(note);
			tx.oncomplete = () => resolve();
		});
	},
	async get(filename) {
		const db = await this.init();
		return new Promise((resolve) => {
			const tx = db.transaction(this.storeName, 'readonly');
			const request = tx.objectStore(this.storeName).get(filename);
			request.onsuccess = () => resolve(request.result);
		});
	},
	async getAll() {
		const db = await this.init();
		return new Promise((resolve) => {
			const tx = db.transaction(this.storeName, 'readonly');
			const request = tx.objectStore(this.storeName).getAll();
			request.onsuccess = () => resolve(request.result);
		});
	},

		return new Promise((resolve) => {
			const tx = db.transaction(this.storeName, 'readwrite');
			tx.objectStore(this.storeName).delete(filename);
			tx.oncomplete = () => resolve();
		});

/* =====================================================================
			   5. GITHUB API SERVICE (Strictly Network Operations)
			===================================================================== */
const GitHubService = {
	/* =====================================================================
	   AUXILIARY HELPERS
	===================================================================== */

	// Internal API fetcher for clean error handling and boilerplate reduction
	async _apiFetch(url, token, options = {}) {
		const res = await fetch(url, {
			...options,
			headers: {
				'Authorization': `token ${token}`,
				'Accept': 'application/vnd.github.v3+json',
				...options.headers
			},
			cache: 'no-store'
		});

		if (!res.ok) {
			if (res.status === 404 && options.method === 'DELETE') return; // Ignore 404s on deletion
			if (res.status === 409) throw new Error("Conflict: Remote has newer changes. Please Pull first.");

			const errData = await res.json().catch(() => ({}));
			throw new Error(errData.message || `GitHub API error: ${res.status}`);
		}

		return res;
	},

	// The VFS Chroot Translator: Converts local filenames to absolute remote paths
	_getFullPath(rootDir, filename) {
		const cleanRoot = (rootDir || '').replace(/^\/+|\/+$/g, '');
		const cleanFile = (filename || '').replace(/^\/+/, '');
		return cleanRoot ? `${cleanRoot}/${cleanFile}` : cleanFile;
	},

	/* =====================================================================
	   TREE OPERATIONS (From previous design)
	===================================================================== */

	async _getShallowTree(workspace, keychain) {
		const { host, owner, repo, branch, rootDir } = workspace;
		const safePath = (rootDir || '').replace(/^\/+|\/+$/g, '');

		const url = `${host}/repos/${owner}/${repo}/contents/${safePath}?ref=${branch}`;
		const res = await this._apiFetch(url, keychain.token);
		const contents = await res.json();

		if (!Array.isArray(contents)) throw new Error(`Not a directory: ${safePath}`);

		return contents.map(item => ({
			path: item.name, 
			sha: item.sha,
			type: item.type === 'dir' ? 'folder' : 'blob',
			size: item.size || 0
		}));
	},

	async _getDeepTree(workspace, keychain) {
		const { host, owner, repo, branch, rootDir } = workspace;
		const safePath = (rootDir || '').replace(/^\/+|\/+$/g, '');
		const treeRev = `${branch}:${safePath}`;

		const url = `${host}/repos/${owner}/${repo}/git/trees/${treeRev}?recursive=1`;
		const res = await this._apiFetch(url, keychain.token);
		const treeData = await res.json();

		if (treeData.truncated) console.warn("GitHub API Warning: Tree truncated.");

		return treeData.tree
			.filter(item => item.type === 'blob') 
			.map(item => ({
				path: item.path, 
				sha: item.sha,
				type: 'blob',
				size: item.size || 0
			}));
	},

	async getTree(workspace, keychain) {
		if (!keychain || !keychain.token) throw new Error("Missing credentials in keychain.");

		const tree = workspace.shallow 
			? await this._getShallowTree(workspace, keychain)
			: await this._getDeepTree(workspace, keychain);

		return { tree };
	},

	/* =====================================================================
	   FILE OPERATIONS (Refined for VFS)
	===================================================================== */

	async getFile(filename, workspace, keychain) {
		const fullPath = this._getFullPath(workspace.rootDir, filename);
		const { host, owner, repo, branch } = workspace;
		const url = `${host}/repos/${owner}/${repo}/contents/${fullPath}?ref=${branch}`;

		const isText = Utils.isTextFile(filename);

		// For text, we request standard JSON (Base64). For binaries, we request raw bytes.
		const headers = isText 
			? {} 
			: { 'Accept': 'application/vnd.github.raw' };

		const res = await this._apiFetch(url, keychain.token, { headers });

		// Handle Binary Files
		if (!isText) {
			const rawBlob = await res.blob();
			const ext = filename.split('.').pop().toLowerCase();

			let mimeType = 'application/octet-stream';
			if (Utils.isPdfFile(filename)) mimeType = 'application/pdf';
			else if (Utils.isImageFile(filename)) mimeType = `image/${ext}`;
			if (ext === 'svg') mimeType = 'image/svg+xml';
			if (ext === 'jpg') mimeType = 'image/jpeg';

			return new Blob([rawBlob], { type: mimeType });
		}

		// Handle Text Files
		return await res.json();
	},

	async putFile(filename, contentBase64, sha, workspace, keychain) {
		const fullPath = this._getFullPath(workspace.rootDir, filename);
		const { host, owner, repo, branch } = workspace;
		const url = `${host}/repos/${owner}/${repo}/contents/${fullPath}`;

		const payload = { 
			message: `Update ${filename}`, 
			content: contentBase64, 
			branch: branch 
		};
		if (sha) payload.sha = sha;

		const res = await this._apiFetch(url, keychain.token, {
			method: 'PUT',
			headers: { 'Content-Type': 'application/json' },
			body: JSON.stringify(payload)
		});

		return await res.json();
	},

	async deleteFile(filename, sha, workspace, keychain) {
		const fullPath = this._getFullPath(workspace.rootDir, filename);
		const { host, owner, repo, branch } = workspace;
		const url = `${host}/repos/${owner}/${repo}/contents/${fullPath}`;

		const payload = { 
			message: `Delete note: ${filename}`, 
			sha: sha, 
			branch: branch 
		};

		// Note: _apiFetch explicitly ignores 404s on DELETE
		await this._apiFetch(url, keychain.token, {
			method: 'DELETE',
			headers: { 'Content-Type': 'application/json' },
			body: JSON.stringify(payload)
		});
	},

	fileUploadSizeLimit() {
		return 10 * 1024 * 1024; // 10MB hard limit for GitHub Contents API
	}

/* =====================================================================
   5b. DROPBOX API SERVICE (VFS Architecture)
===================================================================== */
const DropboxService = {
	/* =====================================================================
	   AUXILIARY HELPERS
	===================================================================== */
	
	// Converts local filenames to absolute remote Dropbox paths
	_getFullPath(rootDir, filename = '') {
		const cleanRoot = (rootDir || '').replace(/(^\/+|\/+$)/g, '');
		const cleanFile = (filename || '').replace(/(^\/+|\/+$)/g, '');
		const combined = cleanRoot ? (cleanFile ? `${cleanRoot}/${cleanFile}` : cleanRoot) : cleanFile;
		return combined ? `/${combined}` : ''; // Dropbox strictly requires a leading slash, root is ""
	},

	// Slices the absolute Dropbox path back into a VFS relative path
	_stripRoot(rootDir, fullPath) {
		const rootPrefix = this._getFullPath(rootDir, '');
		if (!rootPrefix) return fullPath.substring(1); // Remove the leading slash
		return fullPath.substring(rootPrefix.length + 1); // +1 to drop the separator slash
	},

	_getHeaders(keychain, isContentEndpoint = false) {
		if (!keychain || !keychain.token) throw new Error('Dropbox token missing in keychain.');
		const headers = { 'Authorization': `Bearer ${keychain.token}` };

		// RPC calls MUST have application/json. Content calls MUST NOT.
		if (!isContentEndpoint) headers['Content-Type'] = 'application/json';
		else headers['Content-Type'] = 'application/octet-stream';
		
		return headers;
	},

	async _refreshAccessToken(keychain) {
		const res = await fetch('https://api.dropboxapi.com/oauth2/token', {
			method: 'POST',
			headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
			cache: 'no-store',
			body: new URLSearchParams({
				refresh_token: keychain.refreshToken,
				grant_type: 'refresh_token',
				client_id: keychain.appKey
			})
		});

		if (!res.ok) throw new Error('Dropbox session expired and refresh failed. Please re-link.');

		const data = await res.json();
		keychain.token = data.access_token;
		
		// Flush the mutated keychain reference directly to persistent storage
		localStorage.setItem('notes_keychains', JSON.stringify(AppState.keychains));
	},

	async _apiFetch(url, initOptions = {}, isContentEndpoint = false, customHeaders = {}, keychain) {
		const headers = this._getHeaders(keychain, isContentEndpoint);
		Object.assign(headers, customHeaders);

		// Dropbox /download strictly forbids Content-Type.
		if (url.includes('/download')) delete headers['Content-Type'];

		initOptions.headers = headers;
		initOptions.cache = 'no-store';
		
		let res = await fetch(url, initOptions);

		// Intercept Auth Failures and Auto-Refresh
		if (res.status === 401 && keychain.refreshToken) {
			await this._refreshAccessToken(keychain);
			
			const retryHeaders = this._getHeaders(keychain, isContentEndpoint);
			Object.assign(retryHeaders, customHeaders);
			if (url.includes('/download')) delete retryHeaders['Content-Type'];
			
			initOptions.headers = retryHeaders;
			res = await fetch(url, initOptions);
		}
		
		return res;
	},

	/* =====================================================================
	   TREE OPERATIONS
	===================================================================== */
	
	async getTree(workspace, keychain) {
		let url = 'https://api.dropboxapi.com/2/files/list_folder';
		const targetPath = this._getFullPath(workspace.rootDir);
		
		let payload = { 
			path: targetPath, 
			recursive: !workspace.shallow, 
			limit: 1000 
		};
		
		let allEntries = [];
		let hasMore = true;

		while (hasMore) {
			const res = await this._apiFetch(url, { method: 'POST', body: JSON.stringify(payload) }, false, {}, keychain);
			
			if (!res.ok) {
				const err = await res.json().catch(() => ({}));
				throw new Error(err.error_summary || 'Failed to fetch Dropbox folder tree.');
			}
			
			const data = await res.json();
			allEntries = allEntries.concat(data.entries);

			if (data.has_more) {
				url = 'https://api.dropboxapi.com/2/files/list_folder/continue';
				payload = { cursor: data.cursor };
			} else {
				hasMore = false;
			}
		}

		// VFS Mapping: Filter stubs, strip chroot prefixes, map types
		const tree = allEntries
			.filter(i => i['.tag'] === 'file' || (workspace.shallow && i['.tag'] === 'folder'))
			.map(i => ({ 
				path: this._stripRoot(workspace.rootDir, i.path_display), 
				sha: i.rev || i.id, // Dropbox folders lack a 'rev', substitute 'id' for the stub
				type: i['.tag'] === 'folder' ? 'folder' : 'blob',
				size: i.size || 0
			}));

		return { tree };
	},

	/* =====================================================================
	   FILE OPERATIONS
	===================================================================== */
	
	async getFile(filename, workspace, keychain) {
		const fullPath = this._getFullPath(workspace.rootDir, filename);
		const customHeaders = { 'Dropbox-API-Arg': JSON.stringify({ path: fullPath }) };
		
		const res = await this._apiFetch('https://content.dropboxapi.com/2/files/download', { method: 'POST' }, true, customHeaders, keychain);
		if (!res.ok) throw new Error("Failed to download file from Dropbox.");
		
		const rev = JSON.parse(res.headers.get('Dropbox-API-Result')).rev;
		
		if (!Utils.isTextFile(filename)) {
			const rawBlob = await res.blob();
			const ext = filename.split('.').pop().toLowerCase();

			let mimeType = 'application/octet-stream';
			if (Utils.isPdfFile(filename)) mimeType = 'application/pdf';
			else if (Utils.isImageFile(filename)) mimeType = `image/${ext}`;

			if (ext === 'svg') mimeType = 'image/svg+xml';
			if (ext === 'jpg') mimeType = 'image/jpeg';

			return new Blob([rawBlob], { type: mimeType });
		}

		return { content: Utils.utoa(await res.text()), sha: rev };
	},

	async putFile(filename, base64Content, sha, workspace, keychain) {
		const fullPath = this._getFullPath(workspace.rootDir, filename);
		const binaryString = atob(base64Content);
		
		const bytes = new Uint8Array(binaryString.length);
		for (let i = 0; i < binaryString.length; i++) bytes[i] = binaryString.charCodeAt(i);

		const customHeaders = {
			'Dropbox-API-Arg': JSON.stringify({
				path: fullPath,
				mode: sha ? { '.tag': 'update', update: sha } : { '.tag': 'add' },
				strict_conflict: true
			})
		};

		const res = await this._apiFetch('https://content.dropboxapi.com/2/files/upload', { 
			method: 'POST', 
			body: bytes 
		}, true, customHeaders, keychain);

		if (res.status === 409) throw new Error("Conflict: Remote has newer changes. Please Pull first.");
		if (!res.ok) {
			const err = await res.json().catch(() => ({}));
			throw new Error(err.error_summary || "Upload failed");
		}
		
		return { content: { sha: (await res.json()).rev } };
	},
	
	async deleteFile(filename, sha, workspace, keychain) {
		const fullPath = this._getFullPath(workspace.rootDir, filename);
		const url = 'https://api.dropboxapi.com/2/files/delete_v2';
		const payload = { path: fullPath };
		
		const res = await this._apiFetch(url, { method: 'POST', body: JSON.stringify(payload) }, false, {}, keychain);
		
		if (!res.ok && res.status !== 404 && res.status !== 409) {
			throw new Error("Dropbox deletion failed.");
		}
	},
	
	fileUploadSizeLimit() {
		return 150 * 1024 * 1024; // Standard 150MB un-chunked Dropbox limit
	}
};

Markdown: {
	canHandle: (fn) => /\.(md|markdown)$/i.test(fn || ''),
		depsLoaded: false,

		loadDeps: async function() {
			if (this.depsLoaded) return;
			UI.showStatus('Loading Markdown engine...', false);
			await Promise.all([
				Utils.loadResource('https://cdn.jsdelivr.net/npm/marked/marked.min.js'),
				Utils.loadResource('https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js'),
				Utils.loadResource('https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css', 'style'),
				Utils.loadResource('https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js'),
				Utils.loadResource('https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css', 'style'),
				Utils.loadResource('https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js')
			]);
			await Utils.loadResource('https://cdn.jsdelivr.net/npm/marked-katex-extension@5.0.0/lib/index.umd.js');
			marked.use(
				window.markedKatex({ throwOnError: false, output: 'html' }),
				{
					renderer: {
						image(token) {
							// Prevent eager fetching by holding the URL in data-src
							return `<img data-src="${token.href}" alt="${token.text || ''}" title="${token.title || ''}" />`;
						}
					}
				});
			this.depsLoaded = true;
			UI.showStatus('Markdown engine loaded.');
		},

		create: () => ({
			name: 'MarkdownPlugin',
			supportedModes: ['edit', 'view'],
			textarea: null,
			viewLayer: null,
			filename: null,


			mount: async function(filename, content, viewLayer, editLayer, saveCallback) {
				this.filename = filename;
				this.viewLayer = viewLayer;

				// Ask the factory for a standard editor, but the plugin still OWNS it
				this.textarea = Utils.createStandardEditor(content, saveCallback);
				editLayer.appendChild(this.textarea);

				if (AppState.isViewMode) await this.renderMarkdown();
			},

			onModeSwitch: async function(isViewMode) {
				if (isViewMode) await this.renderMarkdown();
				else this.textarea.focus();
			},

			renderMarkdown: async function() {
				await Plugins.Markdown.loadDeps();

				const rawHtml = marked.parse(this.textarea.value);

				// Must explicitly tell DOMPurify that data-src is a safe attribute
				const safeFragment = DOMPurify.sanitize(rawHtml, { 
					RETURN_DOM_FRAGMENT: true,
					ADD_ATTR: ['data-src'] 
				});

				safeFragment.querySelectorAll('pre code').forEach(block => hljs.highlightElement(block));

				const imgPromises = Array.from(safeFragment.querySelectorAll('img')).map(async (img) => {
					// Read from our safe data attribute
					const src = img.getAttribute('data-src'); 
					if (!src) return;

					if (!src.match(/^(http|https|data:)/i)) {
						// Local Image Lookup
						const file = await DBService.get(Utils.resolvePath(this.filename, src));
						if (file && file.content instanceof Blob) {
							const objectUrl = URL.createObjectURL(file.content);
							img.src = objectUrl; // Assigning the real src safely
							img.onload = () => URL.revokeObjectURL(objectUrl); 
						} else {
							img.alt = `[Image missing locally: ${src}]`;
						}
					} else {
						// External Web Image: Safe to fetch now
						img.src = src; 
					}
				});

				await Promise.all(imgPromises);

				this.viewLayer.replaceChildren(safeFragment);
			},

			freeze: function() {
				if (this.textarea) {
					this.textarea.disabled = true;
				}
			},

			unmount: function() {
				this.textarea = null; 
				this.viewLayer = null;
				this.filename = null;
			} 
		}),
},

	async renderFileList(searchTerm = '', deepSearch = false) {
		// 1. Grab a ticket for this specific render request
		const currentRenderId = ++AppState.renderId;

		let notes = await DBService.getAll();

		// 2. If another search started while we were waiting for the DB, abort this one!
		if (currentRenderId !== AppState.renderId) return;

		DOM.fileList.replaceChildren();
		const term = searchTerm.toLowerCase();

		if (term) {
			if (deepSearch) {
				notes.forEach(note => {
					// Guard against binary blobs
					if (typeof note.content === 'string') {
						const content = note.content.toLowerCase();
						note.matchCount = content.split(term).length - 1;
					} else {
						note.matchCount = 0;
					}
				});
				notes = notes.filter(n => n.matchCount > 0 || n.filename.toLowerCase().includes(term));
				notes.sort((a, b) => (b.matchCount || 0) - (a.matchCount || 0));
			} else {
				notes = notes.filter(n => n.filename.toLowerCase().includes(term));
			}
		} else {
			notes.sort((a, b) => a.filename.localeCompare(b.filename));
		}

		notes.forEach(note => {
			let icon = '🟢'; 
			const isDirty = note.is_dirty;
			const hasRemoteUpdate = note.remote_sha && note.remote_sha !== note.last_synced_sha;
			const isSymlink = note.filename.endsWith('.symlink');

			// Apply Symlink styling
			if (isSymlink) {
				icon = '🔗';
				if (isDirty) icon = '🔗🟡';
			} else {
				if (isDirty && hasRemoteUpdate) icon = '🟡⬇️'; 
				else if (isDirty) icon = '🟡';   
				else if (hasRemoteUpdate) icon = '⬇️';   
			}

			const li = h('li', {
				class: 'file-item' + (note.filename === AppState.currentFilename ? ' active' : ''),

	const Actions = {
	// =====================================================================
	// KEYCHAIN MANAGEMENT
	// =====================================================================
	createKeychain() {
		const name = prompt('Enter keychain name (e.g., Personal GitHub, Work Dropbox):');
		if (!name) return;

		const id = 'kc_' + Date.now();
		AppState.keychains[id] = {
			name: name,
			provider: 'github', // default
			token: '',
			appKey: '',
			refreshToken: ''
		};

		localStorage.setItem('notes_keychains', JSON.stringify(AppState.keychains));
		UI.renderSettings();
	},

	deleteKeychain(id) {
		// Prevent deletion if workspaces are relying on it
		const inUse = Object.values(AppState.workspaces).some(ws => ws.keychainId === id);
		if (inUse) return alert("Cannot delete: This keychain is currently linked to a workspace.");

		if (!confirm(`Delete keychain "${AppState.keychains[id].name}"?`)) return;

		delete AppState.keychains[id];
		localStorage.setItem('notes_keychains', JSON.stringify(AppState.keychains));
		UI.renderSettings();
	},

	// =====================================================================
	// WORKSPACE MANAGEMENT
	// =====================================================================
	createWorkspace() {
		const name = prompt('Enter workspace name (e.g., Docs, Frontend src):');
		if (!name) return;

		const kcIds = Object.keys(AppState.keychains);
		if (kcIds.length === 0) return alert("Please create a Keychain first.");

		const id = 'ws_' + Date.now();
		AppState.workspaces[id] = {
			name: name,
			dbName: 'NotesDB_' + id, 
			keychainId: kcIds[0], // Default to the first available keychain
			host: 'https://api.github.com', 
			owner: '', 
			repo: '', 
			branch: 'main',
			rootDir: '',      // e.g., 'src/docs'
			shallow: false,   // false = recursive IDE view, true = folder exploration
			pins: []
		};

		localStorage.setItem('notes_workspaces', JSON.stringify(AppState.workspaces));
		this.switchWorkspace(id);
		this.openSettings();
	},

	switchWorkspace(id, skipHistory = false) {
		const ws = AppState.workspaces[id];
		if (!ws) return;

		AppState.activeWorkspaceId = id;
		localStorage.setItem('notes_active_workspace', id);

		if (!ws.pins) ws.pins = [];
		AppState.pins = ws.pins;

		UI.resetEditor();
		DOM.searchBar.value = '';

		// History API Upgrade: Push the workspace switch into the session history
		if (!skipHistory) {
			history.pushState(
				{ workspaceId: id, filename: null }, 
				null, 
				window.location.pathname
			);
		} 

		UI.renderPins();
		UI.updateWorkspaceIndicator();
		UI.renderFileList();
		UI.showStatus(`Switched workspace: ${AppState.workspaces[id].name}`);
	},

	deleteWorkspace(id) {
		if (Object.keys(AppState.workspaces).length <= 1) return alert("You cannot delete your only workspace.");
		
		const wsName = AppState.workspaces[id].name;
		const dbName = AppState.workspaces[id].dbName;
		
		if (!confirm(`WARNING: Permanently delete workspace "${wsName}" AND wipe all its local data?\n\nThis action cannot be undone.`)) return;

		// 1. Purge the isolated database directly from the browser's storage
		indexedDB.deleteDatabase(dbName);

		// 2. Remove the workspace from memory
		delete AppState.workspaces[id];
		localStorage.setItem('notes_workspaces', JSON.stringify(AppState.workspaces));

		// 3. UI Routing
		if (AppState.activeWorkspaceId === id) {
			const fallbackId = Object.keys(AppState.workspaces)[0];
			this.switchWorkspace(fallbackId);
			this.openSettings(); 
		} else {
			UI.renderSettings();
		}
	},

	saveSettings() {
		// Save both state arrays simultaneously
		localStorage.setItem('notes_keychains', JSON.stringify(AppState.keychains));
		localStorage.setItem('notes_workspaces', JSON.stringify(AppState.workspaces));
		UI.showStatus('Configuration saved.');
	},

	openSettings() {
		UI.resetEditor();
		AppState.currentFilename = null;
		history.replaceState(null, null, window.location.pathname);

		DOM.filenameLabel.textContent = '⚙️ Settings & Profiles';

		DOM.editLayer.style.display = 'none';
		DOM.viewLayer.style.display = 'none';

		DOM.settingsPanel.style.display = 'block';
		UI.renderSettings();

		if (window.innerWidth < 768) DOM.sidebar.classList.add('collapsed');
	},

	// =====================================================================
	// FILE EDITOR OPERATIONS
	// =====================================================================
	async openFile(filename, skipHistory = false) {
		const note = await DBService.get(filename);
		if (!note) return;

		// --- THE SYMLINK INTERCEPTOR ---
		if (filename.endsWith('.symlink') && !AppState.isSymlinkEditMode) {
			try {
				const payload = JSON.parse(note.content || '{}');

				// Define which fields are actually valid for routing
				const matchableFields = ['provider', 'host', 'owner', 'repo', 'branch', 'rootDir'];
				const payloadKeys = Object.keys(payload).filter(k => matchableFields.includes(k));

				if (payloadKeys.length === 0) {
					return UI.showStatus(`⚠️ Error: Symlink contains no valid routing fields.`, true);
				}

				// Gather all workspaces that match every field provided in the payload
				const matchedIds = Object.keys(AppState.workspaces).filter(id => {
					const ws = AppState.workspaces[id];

					return payloadKeys.every(key => {
						// Special normalization for rootDir
						if (key === 'rootDir') {
							const wsRoot = (ws.rootDir || '').replace(/(^\/+|\/+$)/g, '');
							const targetRoot = (payload.rootDir || '').replace(/(^\/+|\/+$)/g, '');
							return wsRoot === targetRoot;
						}
						// Strict equality for all other provided fields
						return ws[key] === payload[key];
					});
				});

				// Evaluate the match results
				if (matchedIds.length === 1) {
					this.switchWorkspace(matchedIds[0]); // Teleport!
					return; 
				} else if (matchedIds.length > 1) {
					return UI.showStatus(`❌ Ambiguous symlink: Matches ${matchedIds.length} workspaces. Be more specific.`, true);
				} else {
					return UI.showStatus(`❌ Target workspace not found locally.`, true);
				}

			} catch (err) {
				return UI.showStatus(`⚠️ Error: Malformed symlink JSON.`, true);
			}
		}
		// -------------------------------

		// Standard Editor Boot Sequence
		if (!skipHistory) {
		    history.pushState(
		        { workspaceId: AppState.activeWorkspaceId, filename: filename }, 
		        null, 
		        '#' + encodeURIComponent(filename)
		    );
		}

		if (window.innerWidth < 768) {
			DOM.sidebar.classList.add('collapsed');
		}

		UI.setEditorActive(filename, note.content);
		UI.renderFileList(DOM.searchBar.value, false);
	},

	async createFile() {
		let filename = prompt('Enter filename (e.g., folder/draft.txt):');
		if (!filename) return;
		if (!filename.includes('.')) filename += '.txt'; 

		if (await DBService.get(filename)) return alert('File already exists locally.');

		await DBService.put({ filename, content: '', last_synced_sha: null, remote_sha: null, is_dirty: true });
		AppState.syncChannel.postMessage({ type: 'SIDEBAR_REFRESH' });
		this.openFile(filename);
	},

	async handleFileUpload(event) {
		const file = event.target.files[0];
		if (!file) return;

		event.target.value = '';

		if (file.size > SyncService.fileUploadSizeLimit()) {
			return UI.showStatus('File is too large.', true);
		}

		let filename = prompt('Confirm or rename file path (e.g., archive.zip):', file.name);
		if (!filename) return;

		const existing = await DBService.get(filename);
		if (existing && !confirm(`Overwrite existing local file "${filename}"?`)) return;

		const isText = Utils.isTextFile(filename);
		let content;

		if (!isText) {
			content = new Blob([file], { type: file.type || 'application/octet-stream' });
		} else {
			content = await file.text();
		}

		await DBService.put({
			filename,
			content,
			last_synced_sha: existing ? existing.last_synced_sha : null,
			remote_sha: existing ? existing.remote_sha : null,
			is_dirty: true 
		});

		UI.showStatus(`Successfully imported ${filename}.`);
		AppState.syncChannel.postMessage({ type: 'SIDEBAR_REFRESH' });
		this.openFile(filename);
	},

	handleTyping(newContent) {
		if (!AppState.currentFilename) return;
		clearTimeout(AppState.typingTimer);

		AppState.typingTimer = setTimeout(async () => {
			const note = await DBService.get(AppState.currentFilename);
			if (note && note.content !== newContent) {
				note.content = newContent; 
				note.is_dirty = true;
				await DBService.put(note);

				AppState.syncChannel.postMessage({ type: 'LOCAL_EDIT', filename: AppState.currentFilename });
				UI.renderFileList(DOM.searchBar.value, false);
			}
		}, 500); 
	},

	async toggleViewMode() {
		const plugin = AppState.activePlugin;
		if (!plugin || !plugin.supportedModes.includes('view') || !plugin.supportedModes.includes('edit')) return;

		AppState.isViewMode = !AppState.isViewMode;
		UI.applyModeVisibility();

		if (plugin.onModeSwitch) await plugin.onModeSwitch(AppState.isViewMode);
	},

	// =====================================================================
	// SYNC & DB OPERATIONS
	// =====================================================================
	async clearDB(id) {
		const ws = AppState.workspaces[id];
		if (!ws) return;

		if (!confirm(`WARNING: Permanently wipe all local notes for workspace "${ws.name}"?\n\n(This does not delete the workspace itself, just its offline cache.)`)) return;

		try {
			if (id === AppState.activeWorkspaceId) {
				await DBService.clear();

				history.replaceState(null, null, window.location.pathname);
				UI.renderFileList();
				AppState.syncChannel.postMessage({ type: 'SIDEBAR_REFRESH' });
				UI.showStatus(`Local cache cleared for ${ws.name}.`);
			} else {
				indexedDB.deleteDatabase(ws.dbName);
				UI.showStatus(`Local cache cleared for ${ws.name}.`);
			}
		} catch(err) {
			UI.showStatus(`Failed to clear local cache.`, true);
		}
	},

	async deleteFile() {
		const filename = AppState.currentFilename;
		if (!filename) return;
		const note = await DBService.get(filename);
		if (!note) return;

		const msg = note.last_synced_sha ? `Delete ${filename} from local AND remote?` : `Delete ${filename} locally?`;
		if (!confirm(msg)) return;

		try {
			if (note.last_synced_sha) {
				UI.showStatus(`Deleting ${filename} remotely...`);
				await SyncService.deleteFile(filename, note.last_synced_sha);
			}
			await DBService.delete(filename);
			UI.resetEditor();
			history.replaceState(null, null, window.location.pathname);
			AppState.syncChannel.postMessage({ type: 'SIDEBAR_REFRESH' });
			UI.renderFileList();
			UI.showStatus('File deleted successfully.');
		} catch (err) {
			UI.showStatus(`Error: ${err.message}`, true);
		}
	},

	async refreshTree() {
		try {
			UI.showStatus('Refreshing file list remotely...');
			const treeData = await SyncService.getTree();

			const files = treeData.tree.filter(item => item.type === 'blob');

			for (const file of files) {
				let localNote = await DBService.get(file.path);
				if (!localNote) {
					await DBService.put({ filename: file.path, content: '', last_synced_sha: null, remote_sha: file.sha, is_dirty: false });
				} else {
					localNote.remote_sha = file.sha;
					await DBService.put(localNote);
				}
			}
			UI.showStatus('File list updated.');
			AppState.syncChannel.postMessage({ type: 'SIDEBAR_REFRESH' });
			UI.renderFileList(DOM.searchBar.value, false);
		} catch (err) {
			UI.showStatus(`Refresh failed: ${err.message}`, true);
		}
	},

	async pullFile() {
		const filename = AppState.currentFilename;
		if (!filename) return;

		try {
			let localNote = await DBService.get(filename);
			UI.showStatus(`Pulling ${filename}...`);

			const isBinary = Utils.isImageFile(filename) || Utils.isPdfFile(filename);
			const fileResponse = await SyncService.getFile(filename);

			if (!localNote) {
				localNote = { filename, content: '', last_synced_sha: null, remote_sha: null, is_dirty: false };
			}

			if (isBinary) {
				localNote.content = fileResponse; 
				localNote.is_dirty = false;
				localNote.last_synced_sha = localNote.remote_sha; 
			} else {
				const remoteContent = Utils.atou(fileResponse.content);
				if (localNote.is_dirty && localNote.content !== remoteContent) {
					const choice = prompt(`Conflict in ${filename}!\nd: Insert Diff markers\nw: Overwrite local with remote\ni: Ignore remote`, "d");
					if (choice === null) return UI.showStatus("Pull cancelled.");

					if (choice === "w") {
						localNote.content = remoteContent;
						localNote.is_dirty = false;
					} else if (choice == "i") {
						localNote.is_dirty = true;
					} else {
						UI.showStatus(`Loading diff engine...`);
						try {
							await Utils.loadResource("https://cdnjs.cloudflare.com/ajax/libs/jsdiff/5.1.0/diff.min.js");
						} catch (err) {
							return UI.showStatus(`Error: Failed to load diff engine. Merge cancelled.`, true);
						}

						UI.showStatus(`Injecting merge markers...`, true);
						if (typeof Diff !== 'undefined') {
							let merged = "";
							Diff.diffLines(remoteContent, localNote.content).forEach(p => {
								if (p.added) merged += `<<<<<<< LOCAL\n${p.value}\n=======\n`;
								else if (p.removed) merged += `${p.value}>>>>>>> REMOTE\n`;
								else merged += p.value;
							});
							localNote.content = merged;
						} else {
							localNote.content = `<<<<<<< LOCAL\n${localNote.content}\n=======\n${remoteContent}\n>>>>>>> REMOTE`;
						}
						localNote.is_dirty = true; 
					}
				} else {
					localNote.content = remoteContent;
					localNote.is_dirty = false;
				}
				localNote.last_synced_sha = fileResponse.sha;
				localNote.remote_sha = fileResponse.sha;
			}

			await DBService.put(localNote);
			UI.setEditorActive(filename, localNote.content);
			UI.showStatus(`Successfully pulled ${filename}.`);
			AppState.syncChannel.postMessage({ type: 'SIDEBAR_REFRESH' });
			UI.renderFileList(DOM.searchBar.value, false);
		} catch (err) {
			UI.showStatus(`Pull failed: ${err.message}`, true);
		}
	},

	async pushFile() {
		const filename = AppState.currentFilename;
		if (!filename) return;

		try {
			const note = await DBService.get(filename);
			if (!note || !note.is_dirty) return UI.showStatus(`${filename} is already up to date.`);

			UI.showStatus(`Pushing ${filename}...`);

			let base64Content;

			if (typeof note.content === 'object' && note.content !== null) {
				const buffer = await new Response(note.content).arrayBuffer();
				const bytes = new Uint8Array(buffer);

				let binary = '';
				const chunkSize = 8192;
				for (let i = 0; i < bytes.length; i += chunkSize) {
					binary += String.fromCharCode.apply(null, bytes.subarray(i, i + chunkSize));
				}
				base64Content = btoa(binary);
			} else {
				base64Content = Utils.utoa(String(note.content));
			}

			const responseData = await SyncService.putFile(filename, base64Content, note.last_synced_sha);

			note.last_synced_sha = responseData.content.sha;
			note.remote_sha = responseData.content.sha;
			note.is_dirty = false;
			await DBService.put(note);

			UI.showStatus(`Successfully pushed ${filename}.`);
			AppState.syncChannel.postMessage({ type: 'SIDEBAR_REFRESH' });
			UI.renderFileList(DOM.searchBar.value, false);
		} catch (err) {
			UI.showStatus(`Push error: ${err.message}`, true);
		}
	},

	// =====================================================================
	// PIN OPERATIONS (Workspace Contextual)
	// =====================================================================
	addPin() {
		const pin = prompt('Enter a filename or directory path to pin (e.g., docs/ or README.md):',
			AppState.currentFilename || '');
		if (!pin) return;

		if (!AppState.pins.includes(pin)) {
			AppState.pins.push(pin);
			
			this.saveSettings(); 
			UI.renderPins();
		}
	},

	removePin(pin, event) {
		event.stopPropagation();
		const index = AppState.pins.indexOf(pin);
		if (index > -1) {
			AppState.pins.splice(index, 1);
			this.saveSettings(); 
			UI.renderPins();
		}
	},

	async handlePinClick(pin) {
		const note = await DBService.get(pin);

		if (note) {
			this.openFile(pin);
		} else {
			DOM.searchBar.value = pin;
			UI.renderFileList(pin, false);
		}
	},

	// =====================================================================
	// DROPBOX OAUTH HANDLERS
	// =====================================================================
	async linkDropboxPKCE(kcId) {
		const keychain = AppState.keychains[kcId];
		const key = keychain.appKey;
		
		if (!key) return alert("Please enter your App Key first (and ensure it is saved).");

		const verifier = Utils.generateCodeVerifier();
		const challenge = await Utils.generateCodeChallenge(verifier);

		sessionStorage.setItem('dbx_pkce_verifier', verifier);
		sessionStorage.setItem('dbx_pkce_keychain_id', kcId);

		const redirectUri = window.location.origin + window.location.pathname;
		const authUrl = `https://www.dropbox.com/oauth2/authorize?client_id=${key}&response_type=code&code_challenge=${challenge}&code_challenge_method=S256&token_access_type=offline&redirect_uri=${encodeURIComponent(redirectUri)}`;
		window.location.href = authUrl; 
	},

	async handlePKCERedirect() {
		const params = new URLSearchParams(window.location.search);
		const code = params.get('code');
		const verifier = sessionStorage.getItem('dbx_pkce_verifier');
		const kcId = sessionStorage.getItem('dbx_pkce_keychain_id');

		if (!code || !verifier || !kcId) return false;

		window.history.replaceState({}, document.title, window.location.pathname);
		sessionStorage.removeItem('dbx_pkce_verifier');
		sessionStorage.removeItem('dbx_pkce_keychain_id'); 

		const keychain = AppState.keychains[kcId];
		if (!keychain) return false;

		try {
			const redirectUri = window.location.origin + window.location.pathname;
			const res = await fetch('https://api.dropboxapi.com/oauth2/token', {
				method: 'POST',
				headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
				body: new URLSearchParams({
					client_id: keychain.appKey, 
					grant_type: 'authorization_code',
					code: code,
					code_verifier: verifier,
					redirect_uri: redirectUri
				})
			});

			const data = await res.json();

			if (!res.ok) {
				console.error("DROPBOX API ERROR:", data);
				throw new Error(data.error_description || data.error || "Unknown Auth Failure");
			}

			keychain.provider = 'dropbox';
			keychain.token = data.access_token;
			keychain.refreshToken = data.refresh_token; 

			localStorage.setItem('notes_keychains', JSON.stringify(AppState.keychains));

			return true;
		} catch (err) {
			alert(`PKCE Linking failed: ${err.message}`);
			return false;
		}
	},
	ensureDefaultState() {
		// 1. Check if we already have a valid, active workspace. If so, we are done.
		if (AppState.activeWorkspace) {
			return; 
		}

		// 2. We don't have an active workspace. Do we have ANY workspaces left?
		// (This handles the edge case where the active ID was corrupted or deleted)
		const existingWsIds = Object.keys(AppState.workspaces);
		if (existingWsIds.length > 0) {
			this.switchWorkspace(existingWsIds[0]);
			return;
		}

		// 3. The app is completely blank. We must generate the default relational state.
		let defaultKcId;
		const existingKcIds = Object.keys(AppState.keychains);

		if (existingKcIds.length > 0) {
			defaultKcId = existingKcIds[0];
		} else {
			// Create an empty default Keychain
			defaultKcId = 'kc_default';
			AppState.keychains[defaultKcId] = {
				name: 'Default Credentials',
				provider: 'github',
				token: '',
				appKey: '',
				refreshToken: ''
			};
			localStorage.setItem('notes_keychains', JSON.stringify(AppState.keychains));
		}

		// 4. Create the default Workspace linked to the Keychain
		const defaultWsId = 'ws_default';
		AppState.workspaces[defaultWsId] = {
			name: 'Local Workspace',
			dbName: 'NotesDB_default', 
			keychainId: defaultKcId, 
			host: 'https://api.github.com', 
			owner: '', 
			repo: '', 
			branch: 'main',
			rootDir: '',      
			shallow: false,
			pins: []
		};
		localStorage.setItem('notes_workspaces', JSON.stringify(AppState.workspaces));

		// 5. Safely boot the app into the new default workspace
		this.switchWorkspace(defaultWsId);
	}
};

	<!-- ends here -->
	

			<!-- Boot.js starts here -->
	AppState.syncChannel.onmessage = (event) => {
	if (event.data.type === 'SIDEBAR_REFRESH') UI.renderFileList();

	if (event.data.type === 'LOCAL_EDIT' && AppState.currentFilename === event.data.filename) {
		if (!AppState.isFrozen) {
			AppState.isFrozen = true;

			// 1. Core locks global Chrome
			DOM.pullBtn.disabled = true;
			DOM.pushBtn.disabled = true;
			DOM.editLayer.style.opacity = '0.6';

			// 2. Plugin locks its specific inputs
			if (AppState.activePlugin && AppState.activePlugin.freeze) {
				AppState.activePlugin.freeze();
			} else {
				// Brutal fallback if a plugin forgets to implement freeze()
				DOM.editLayer.style.pointerEvents = 'none';
			}

			UI.showStatus(`⚠️ Edited in another tab.`, true);
		}
	}
};

window.addEventListener('DOMContentLoaded', async () => {
    // 1. Capture the DOM nodes
    initDOM();

    // 2. Heal the state if it's a first-time load (or orphaned)
    Actions.ensureDefaultState();
    
    // 3. Render the UI safely using the active workspace
	UI.updateWorkspaceIndicator();
    UI.renderFileList();
    UI.renderPins();
    
    // 4. Handle OAuth redirects if necessary
    await Actions.handlePKCERedirect();

    // 5. Wire up local DOM event listeners
    DOM.searchBar.addEventListener('input', () => UI.renderFileList(DOM.searchBar.value, false));
    DOM.searchBar.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            UI.renderFileList(DOM.searchBar.value, true);
        }
    });

    // 6. Wire up the View Layer link interceptor (Hypermedia routing)
    DOM.viewLayer.addEventListener('click', (e) => {
        let target = e.target;
        while (target && target.tagName !== 'A') target = target.parentNode;

        if (target && target.tagName === 'A') {
            const href = target.getAttribute('href');

            if (href && !href.match(/^(http|https|mailto:|data:|#)/i)) {
                e.preventDefault(); 
                
                const pathWithoutHash = href.split('#')[0];
                const targetPath = Utils.resolvePath(AppState.currentFilename, pathWithoutHash);

                DOM.searchBar.value = ''; 

                (async () => {
                    let finalPath = targetPath;
                    let note = await DBService.get(finalPath);

                    // Fuzzy routing fallback
                    if (!note) {
                        const allKeys = await DBService.getAllKeys();
                        const target = Utils.parsePath(targetPath);
                        const candidates = allKeys.filter(key => {
                            const k = Utils.parsePath(key);
                            return k.dir === target.dir && k.basename === target.basename && key !== targetPath;
                        });

                        if (candidates.length === 1) {
                            finalPath = candidates[0];
                            note = await DBService.get(finalPath);
                            UI.showStatus(`Rerouted: ${target.filename} \u2192 ${Utils.parsePath(finalPath).filename}`);
                        }
                    }

                    if (note) {
                        Actions.openFile(finalPath);
                    } else {
                        UI.showStatus(`The file "${targetPath}" does not exist locally.`, true);
                    }
                })();
            }
        }
    });
    
    // 7. Check if there is a file hash in the URL to open on boot
    const hash = window.location.hash.substring(1);
    if (hash) {
        Actions.openFile(decodeURIComponent(hash), true);
    }
});

window.addEventListener('popstate', (e) => {
    const state = e.state;

    // Route A: Rich Session Navigation (The user clicked Back/Forward)
    if (state && state.workspaceId) {
        // 1. If the history entry belongs to a different workspace, swap environments safely
        if (state.workspaceId !== AppState.activeWorkspaceId) {
            Actions.switchWorkspace(state.workspaceId, true); // true = skipHistory
        }
        
        // 2. Restore the specific file view, or reset to the root tree
        if (state.filename) {
            Actions.openFile(state.filename, true);
        } else {
            UI.resetEditor();
            UI.renderFileList(DOM.searchBar.value, false);
        }
        return;
    }

    // Route B: Cold Boot / Manual Hash Edit (No state object available)
    const hash = window.location.hash.substring(1);
    if (hash) {
        Actions.openFile(decodeURIComponent(hash), true);
    } else {
        UI.resetEditor();
        UI.renderFileList(DOM.searchBar.value, false);
    }
});

window.addEventListener('offline', () => UI.showStatus('📴 You are offline. Changes will save locally.', true));
window.addEventListener('online', () => UI.showStatus('📶 You are back online. Safe to Push/Pull.'));

document.addEventListener('keydown', (e) => {
	if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 's') {
		e.preventDefault();
		AppState.currentFilename ? Actions.pushFile() : UI.showStatus("No file open to push.", true);
	}
	if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'k') {
		e.preventDefault();
		DOM.searchBar.focus();
		DOM.searchBar.select();
	}
	if (e.altKey && e.key === 'ArrowDown') {
		e.preventDefault();
		AppState.currentFilename ? Actions.pullFile() : UI.showStatus("No file open to pull.", true);
	}
	if (e.altKey && e.key.toLowerCase() === 'r') {
		e.preventDefault();
		Actions.refreshTree();
	}
});

document.addEventListener('paste', async (e) => {
	// Allow paste when focus is on the sidebar
	if (e.target.tagName === 'INPUT' || !e.target.closest('#sidebar')) {
		return; 
	}

	const clipboardData = e.clipboardData || window.clipboardData;
	const items = clipboardData.items;

	for (let i = 0; i < items.length; i++) {
		const item = items[i];

		if (item.type.indexOf('image') !== -1) {
			e.preventDefault(); 

			const blob = item.getAsFile();
			if (!blob) continue;

			const ext = blob.type.split('/')[1] || 'png';
			let filename = prompt('Upload image directly to repository:', `images/image.${ext}`);

			if (!filename) {
				UI.showStatus('Image upload cancelled.');
				return; 
			}

			if (!filename.includes('.')) filename += `.${ext}`;

			UI.showStatus(`Saving ${filename}...`);

			await DBService.put({
				filename: filename,
				content: blob,
				last_synced_sha: null,
				remote_sha: null,
				is_dirty: true 
			});

			// Only update the file tree, do not touch the editor
			AppState.syncChannel.postMessage({ type: 'SIDEBAR_REFRESH' });
			UI.showStatus(`Successfully saved ${filename}.`);

			break; 
		}
	}
});
