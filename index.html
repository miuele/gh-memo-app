		<style>

			#editor-container { flex-grow: 1; display: flex; flex-direction: column; position: relative; overflow: hidden; }
			#note-viewer {

<input type="file" id="file-upload" style="display:none;" onchange="Actions.handleFileUpload(event)">

					<button id="pull-btn" onclick="Actions.pullFile()" style="display:none;">⬇️ Pull File</button>

				<textarea id="note-content" disabled placeholder="Select or create a file to start typing..."></textarea>

<div id="settings-panel"></div>

		<script>
			/* =====================================================================
			   1. CORE STATE & CONFIGURATION
			===================================================================== */
			const AppState = {
				renderId: 0,
				// 1. The Master Directory
				profiles: JSON.parse(localStorage.getItem('notes_profiles') || '{}'),
				activeProfileId: localStorage.getItem('notes_active_profile') || null,
				
				// 2. The Current Context (Hydrated on boot)
				config: { host: '', token: '', owner: '', repo: '', branch: '' },
				pins: [],
				
				// UI State
				isViewMode: false,
				currentFilename: null,
				typingTimer: null,
				syncChannel: new BroadcastChannel('github_notes_sync')
			};

			/* =====================================================================
			   2. DOM ELEMENT CACHE (Populated on load)
			===================================================================== */
			const DOM = {};
			function initDOM() {
				DOM.sidebar = document.getElementById('sidebar');
				DOM.fileInput = document.getElementById('file-upload');
				DOM.pinContainer = document.getElementById('pin-container');
				DOM.searchBar = document.getElementById('search-bar');
				DOM.fileList = document.getElementById('file-list');
				DOM.editor = document.getElementById('note-content');
				DOM.viewer = document.getElementById('note-viewer');
				DOM.filenameLabel = document.getElementById('current-filename');
				DOM.pullBtn = document.getElementById('pull-btn');
				DOM.pushBtn = document.getElementById('push-btn');
				DOM.deleteBtn = document.getElementById('delete-btn');
				DOM.statusBar = document.getElementById('status-bar');
				DOM.viewToggle = document.getElementById('view-toggle');
				DOM.settingsPanel = document.getElementById('settings-panel');
			}

			/* =====================================================================
			   3. UTILITIES
			===================================================================== */
			const Utils = {
				utoa: (text) => btoa(Array.from(new TextEncoder().encode(text)).map(b => String.fromCharCode(b)).join('')),
				atou: (b64) => new TextDecoder().decode(new Uint8Array(atob(b64.replace(/[\r\n]+/g, '')).split('').map(c => c.charCodeAt(0)))),
				isImageFile: (filename) => /\.(png|jpg|jpeg|gif|svg|webp|ico)$/i.test(filename || ''),
				isPdfFile: (filename) => /\.pdf$/i.test(filename || ''),
				isTextFile: (filename) => {
					// Files with no extension are usually text (e.g., Makefile, .env)
					if (!filename.includes('.')) return true; 
					// Add or remove extensions to this regex as needed
					return /\.(txt|md|markdown|csv|json|xml|html|css|js|ts|jsx|tsx|py|yml|yaml|ini|env|sh|bat|ps1|c|cpp|h|rs|go|java|toml)$/i.test(filename);
				},
				resolvePath: (basePath, relativePath) => {
					// Ignore external web links and base64 data URIs
					if (relativePath.match(/^(http|https|data:|mailto:|#)/i)) return relativePath;

					const stack = basePath.split('/').slice(0, -1); // Get current directory
					const parts = relativePath.split('/');

					for (const part of parts) {
						if (part === '.') continue;
						if (part === '..') stack.pop();
						else stack.push(part);
					}
					return stack.join('/');
				},
				parsePath: (path) => {
					const lastSlash = path.lastIndexOf('/');
					const dir = lastSlash === -1 ? '' : path.substring(0, lastSlash + 1);
					const filename = lastSlash === -1 ? path : path.substring(lastSlash + 1);
					const lastDot = filename.lastIndexOf('.');
					const basename = lastDot === -1 ? filename : filename.substring(0, lastDot);
					return { dir, filename, basename };
				}
			};

			/* =====================================================================
			   4. DATABASE SERVICE (IndexedDB Abstraction)
			===================================================================== */
			const DBService = {
				storeName: 'notes',
				// Dynamically read the database name for the active profile
				get dbName() {
					if (!AppState.activeProfileId || !AppState.profiles[AppState.activeProfileId]) {
						throw new Error("No active profile. Database locked.");
					}
					return AppState.profiles[AppState.activeProfileId].dbName;
				},
				
				init() {
					return new Promise((resolve, reject) => {
						const request = indexedDB.open(this.dbName, 1);
						request.onupgradeneeded = (e) => {
							const db = e.target.result;
							if (!db.objectStoreNames.contains(this.storeName)) {
								db.createObjectStore(this.storeName, { keyPath: 'filename' });
							}
						};
						request.onsuccess = () => resolve(request.result);
						request.onerror = () => reject(request.error);
					});
				},
				async put(note) {
					const db = await this.init();
					return new Promise((resolve) => {
						const tx = db.transaction(this.storeName, 'readwrite');
						tx.objectStore(this.storeName).put(note);
						tx.oncomplete = () => resolve();
					});
				},
				async get(filename) {
					const db = await this.init();
					return new Promise((resolve) => {
						const tx = db.transaction(this.storeName, 'readonly');
						const request = tx.objectStore(this.storeName).get(filename);
						request.onsuccess = () => resolve(request.result);
					});
				},
				async getAll() {
					const db = await this.init();
					return new Promise((resolve) => {
						const tx = db.transaction(this.storeName, 'readonly');
						const request = tx.objectStore(this.storeName).getAll();
						request.onsuccess = () => resolve(request.result);
					});
				},
				async delete(filename) {
					const db = await this.init();
					return new Promise((resolve) => {
						const tx = db.transaction(this.storeName, 'readwrite');
						tx.objectStore(this.storeName).delete(filename);
						tx.oncomplete = () => resolve();
					});
				},
				async getAllKeys() {
					const db = await this.init();
					return new Promise((resolve) => {
						const tx = db.transaction(this.storeName, 'readonly');
						const request = tx.objectStore(this.storeName).getAllKeys();
						request.onsuccess = () => resolve(request.result);
					});
				},
				async clear() {
					const db = await this.init();
					return new Promise((resolve, reject) => {
						const tx = db.transaction(this.storeName, 'readwrite');
						tx.objectStore(this.storeName).clear();
						tx.oncomplete = () => resolve();
						tx.onerror = () => reject(tx.error);
					});
				}
			};

			/* =====================================================================
			   5. GITHUB API SERVICE (Strictly Network Operations)
			===================================================================== */
			const GitHubService = {
				getHeaders() {
					if (!AppState.config.token) throw new Error('GitHub token not configured.');
					return {
						'Authorization': `token ${AppState.config.token}`,
						'Accept': 'application/vnd.github.v3+json',
						'Content-Type': 'application/json'
					};
				},
				async getTree() {
					const { host, owner, repo, branch } = AppState.config;
					const url = `${host}/repos/${owner}/${repo}/git/trees/${branch}?recursive=1`;
					const res = await fetch(url, { headers: this.getHeaders(), cache: 'no-store' });
					if (!res.ok) throw new Error('Failed to fetch repository tree.');
					return await res.json();
				},
				async getFile(filename) {
					const { host, owner, repo } = AppState.config;
					const url = `${host}/repos/${owner}/${repo}/contents/${filename}`;
					const isImage = Utils.isImageFile(filename);
					const isPdf = Utils.isPdfFile(filename);

					const headers = this.getHeaders();
					if (!Utils.isTextFile(filename)) headers['Accept'] = 'application/vnd.github.raw';

					const res = await fetch(url, { headers, cache: 'no-store' });
					if (!res.ok) throw new Error('Failed to fetch file. It may have been deleted remotely.');

					if (!Utils.isTextFile(filename)) {
						const rawBlob = await res.blob();
						const ext = filename.split('.').pop().toLowerCase();
						
						let mimeType = 'application/octet-stream';
						if (Utils.isPdfFile(filename)) mimeType = 'application/pdf';
						else if (Utils.isImageFile(filename)) mimeType = `image/${ext}`;
						
						if (ext === 'svg') mimeType = 'image/svg+xml';
						if (ext === 'jpg') mimeType = 'image/jpeg';
						
						return new Blob([rawBlob], { type: mimeType });
					}

					return await res.json();
				},
				async putFile(filename, contentBase64, sha) {
					const { host, owner, repo, branch } = AppState.config;
					const url = `${host}/repos/${owner}/${repo}/contents/${filename}`;
					const payload = { message: `Update ${filename}`, content: contentBase64, branch: branch };
					if (sha) payload.sha = sha;

					const res = await fetch(url, {
						method: 'PUT',
						headers: this.getHeaders(),
						body: JSON.stringify(payload)
					});
					if (res.status === 409) throw new Error(`Remote has newer changes. Please Pull first.`);
					if (!res.ok) throw new Error(`Failed to push file.`);
					return await res.json();
				},
				async deleteFile(filename, sha) {
					const { host, owner, repo, branch } = AppState.config;
					const url = `${host}/repos/${owner}/${repo}/contents/${filename}`;
					const payload = { message: `Delete note: ${filename}`, sha: sha, branch: branch };
					
					const res = await fetch(url, {
						method: 'DELETE',
						headers: this.getHeaders(),
						body: JSON.stringify(payload)
					});
					if (!res.ok && res.status !== 404) {
						const errorData = await res.json();
						throw new Error(errorData.message || "GitHub deletion failed.");
					}
				}
			};

			/* =====================================================================
			   5b. DROPBOX API SERVICE
			===================================================================== */
			const DropboxService = {
				getHeaders(isContentEndpoint = false) {
					if (!AppState.config.token) throw new Error('Dropbox token missing.');
					const headers = { 'Authorization': `Bearer ${AppState.config.token}` };
					
					// RPC calls (like list_folder) MUST have application/json
					// Content calls (upload/download) MUST NOT have application/json
					if (!isContentEndpoint) {
						headers['Content-Type'] = 'application/json';
					} else {
						headers['Content-Type'] = 'application/octet-stream';
					}
					return headers;
				},

				formatPath(filename) { return filename.startsWith('/') ? filename : `/${filename}`; },

				async apiFetch(url, initOptions = {}, isContentEndpoint = false, customHeaders = {}) {
					const headers = this.getHeaders(isContentEndpoint);
					Object.assign(headers, customHeaders);
					
					// STALKER FIX: Dropbox /download strictly forbids Content-Type.
					if (url.includes('/download')) delete headers['Content-Type'];

					initOptions.headers = headers;
					let res = await fetch(url, initOptions);
					
					if (res.status === 401 && AppState.config.refreshToken) {
						await this.refreshAccessToken();
						const retryHeaders = this.getHeaders(isContentEndpoint);
						Object.assign(retryHeaders, customHeaders);
						if (url.includes('/download')) delete retryHeaders['Content-Type'];
						initOptions.headers = retryHeaders;
						res = await fetch(url, initOptions);
					}
					return res;
				},

				async refreshAccessToken() {
					const { appKey, appSecret, refreshToken } = AppState.config;
					const res = await fetch('https://api.dropboxapi.com/oauth2/token', {
						method: 'POST',
						headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
						body: new URLSearchParams({
							refresh_token: refreshToken,
							grant_type: 'refresh_token',
							client_id: appKey,
							client_secret: appSecret
						})
					});
					if (!res.ok) throw new Error('Refresh failed.');
					const data = await res.json();
					AppState.config.token = data.access_token;
					AppState.profiles[AppState.activeProfileId].config = AppState.config;
					localStorage.setItem('notes_profiles', JSON.stringify(AppState.profiles));
				},

				async getTree() {
					let url = 'https://api.dropboxapi.com/2/files/list_folder';
					let payload = { path: "", recursive: true, limit: 1000 };
					let allEntries = [];
					let hasMore = true;

					while (hasMore) {
						const res = await this.apiFetch(url, { method: 'POST', body: JSON.stringify(payload) });
						if (!res.ok) throw new Error('Failed to fetch Dropbox folder tree.');
						const data = await res.json();
						allEntries = allEntries.concat(data.entries);

						if (data.has_more) {
							url = 'https://api.dropboxapi.com/2/files/list_folder/continue';
							payload = { cursor: data.cursor };
						} else hasMore = false;
					}

					return { 
						tree: allEntries.filter(i => i['.tag'] === 'file').map(i => ({ 
							path: i.path_display.substring(1), 
							sha: i.rev, 
							type: 'blob',
							size: i.size // <--- FIX: Size mapped so the 5MB filter doesn't break
						})) 
					};
				},

				async getFile(filename) {
					const customHeaders = { 'Dropbox-API-Arg': JSON.stringify({ path: this.formatPath(filename) }) };
					const res = await this.apiFetch('https://content.dropboxapi.com/2/files/download', { method: 'POST' }, true, customHeaders);
					const rev = JSON.parse(res.headers.get('Dropbox-API-Result')).rev;
					if (!Utils.isTextFile(filename)) {
						const rawBlob = await res.blob();
						const ext = filename.split('.').pop().toLowerCase();
						
						let mimeType = 'application/octet-stream';
						if (Utils.isPdfFile(filename)) mimeType = 'application/pdf';
						else if (Utils.isImageFile(filename)) mimeType = `image/${ext}`;
						
						if (ext === 'svg') mimeType = 'image/svg+xml';
						if (ext === 'jpg') mimeType = 'image/jpeg';
						
						return new Blob([rawBlob], { type: mimeType });
					}
					
					return { content: Utils.utoa(await res.text()), sha: rev };
				},

				async putFile(filename, base64Content, sha) {
					const binaryString = atob(base64Content);
					const bytes = new Uint8Array(binaryString.length);
					for (let i = 0; i < binaryString.length; i++) bytes[i] = binaryString.charCodeAt(i);

					const customHeaders = {
						'Dropbox-API-Arg': JSON.stringify({
							path: this.formatPath(filename),
							mode: sha ? { '.tag': 'update', update: sha } : { '.tag': 'add' },
							strict_conflict: true
						})
					};

					const res = await this.apiFetch('https://content.dropboxapi.com/2/files/upload', { 
						method: 'POST', 
						body: bytes 
					}, true, customHeaders);

					if (res.status === 409) throw new Error("Conflict: Pull first.");
					if (!res.ok) {
						const err = await res.json();
						throw new Error(err.error_summary || "Upload failed");
					}
					return { content: { sha: (await res.json()).rev } };
				},
				async deleteFile(filename) {
					const url = 'https://api.dropboxapi.com/2/files/delete_v2';
					const payload = { path: this.formatPath(filename) };
					const res = await this.apiFetch(url, { method: 'POST', body: JSON.stringify(payload) });
					if (!res.ok && res.status !== 404) throw new Error("Dropbox deletion failed.");
				}
			};
			/* =====================================================================
			   5c. SYNC PROXY SERVICE
			===================================================================== */

				get active() {

				},
				getTree: () => SyncService.active.getTree(),
				getFile: (filename) => SyncService.active.getFile(filename),
				putFile: (filename, content, sha) => SyncService.active.putFile(filename, content, sha),
				deleteFile: (filename, sha) => SyncService.active.deleteFile(filename, sha)
			};

			   6. UI CONTROLLER (Visual Updates)

					if (isUnsupported) {

						DOM.viewToggle.style.display = 'none';

				},
async renderFileList(searchTerm = '', deepSearch = false) {
					// 1. Grab a ticket for this specific render request
					const currentRenderId = ++AppState.renderId;
					
					let notes = await DBService.getAll();
					
					// 2. If another search started while we were waiting for the DB, abort this one!
					if (currentRenderId !== AppState.renderId) return;

					DOM.fileList.innerHTML = '';
					const term = searchTerm.toLowerCase();

					if (term) {
						if (deepSearch) {
							notes.forEach(note => {
								// Guard against binary blobs
								if (typeof note.content === 'string') {
									const content = note.content.toLowerCase();
									note.matchCount = content.split(term).length - 1;
								} else {
									note.matchCount = 0;
								}
							});
							notes = notes.filter(n => n.matchCount > 0 || n.filename.toLowerCase().includes(term));
							notes.sort((a, b) => (b.matchCount || 0) - (a.matchCount || 0));
						} else {
							notes = notes.filter(n => n.filename.toLowerCase().includes(term));
						}
					} else {
						notes.sort((a, b) => a.filename.localeCompare(b.filename));
					}

					notes.forEach(note => {
						const li = document.createElement('li');
						li.className = 'file-item' + (note.filename === AppState.currentFilename ? ' active' : '');
						li.onclick = () => Actions.openFile(note.filename);

						let icon = '🟢'; 
						const isDirty = note.is_dirty;
						const hasRemoteUpdate = note.remote_sha && note.remote_sha !== note.last_synced_sha;

						if (isDirty && hasRemoteUpdate) icon = '🟡⬇️'; 
						else if (isDirty) icon = '🟡';   
						else if (hasRemoteUpdate) icon = '⬇️';   

						let html = `<span>${icon} ${note.filename}</span>`;
						if (deepSearch && note.matchCount) {
							html += `<span class="match-count">${note.matchCount} match${note.matchCount > 1 ? 'es' : ''}</span>`;
						}
						li.innerHTML = html;
						DOM.fileList.appendChild(li);
					});
				},

			/* =====================================================================
			   7. ACTIONS (Business Logic & Workflows)
			===================================================================== */
			const Actions = {
				createProfile(name) {
					if (!name) name = prompt('Enter profile name (e.g., Personal, Work, Local Server):');
					if (!name) return;
					
					const id = 'profile_' + Date.now();
					AppState.profiles[id] = {
						name: name,
						dbName: 'NotesDB_' + id, 
						config: { 
							provider: 'github', // <--- New Field
							host: 'https://api.github.com', 
							token: '', 
							owner: '', 
							repo: '', 
							branch: 'main' 
						},
						pins: []
					};
					
					localStorage.setItem('notes_profiles', JSON.stringify(AppState.profiles));
					this.switchProfile(id);
					this.configureGitHub(); // Prompt for settings immediately
				},

				switchProfile(profileId) {
					if (!AppState.profiles[profileId]) return;

					// 1. Update Master State
					AppState.activeProfileId = profileId;
					localStorage.setItem('notes_active_profile', profileId);
					
					// 2. Hydrate Context
					const profile = AppState.profiles[profileId];
					AppState.config = profile.config;
					AppState.pins = profile.pins || [];

					// 3. Brutally reset the UI to prevent data bleeding
					UI.resetEditor();
					DOM.searchBar.value = '';
					history.replaceState(null, null, window.location.pathname); 
					
					// 4. Boot the new environment
					UI.renderPins();
					UI.renderFileList();
					UI.showStatus(`Switched to profile: ${profile.name}`);
				},

				saveProfile() {
					if (!AppState.activeProfileId) return;
					AppState.profiles[AppState.activeProfileId].config = AppState.config;
					AppState.profiles[AppState.activeProfileId].pins = AppState.pins;
					localStorage.setItem('notes_profiles', JSON.stringify(AppState.profiles));
				},

				configureGitHub() {
					UI.resetEditor();
					AppState.currentFilename = null;
					history.replaceState(null, null, window.location.pathname);
					
					DOM.filenameLabel.innerText = '⚙️ Settings & Profiles';
					DOM.editor.style.display = 'none';
					DOM.settingsPanel.style.display = 'block';
					UI.renderSettings();
					
					if (window.innerWidth < 768) DOM.sidebar.classList.add('collapsed');
				},

				// Add these two new functions:
				updateProfileConfig(id) {
					if (!AppState.profiles[id]) return;
					const c = AppState.profiles[id].config;
					
					c.provider = document.getElementById(`cfg-provider-${id}`).value; // Capture Provider
					c.host = document.getElementById(`cfg-host-${id}`).value.trim();
					c.owner = document.getElementById(`cfg-owner-${id}`).value.trim();
					c.repo = document.getElementById(`cfg-repo-${id}`).value.trim();
					c.branch = document.getElementById(`cfg-branch-${id}`).value.trim();
					
					// Only overwrite the token manually if GitHub is the active provider.
					// Dropbox manages its own token via the OAuth handshake.
					if (c.provider === 'github') {
						c.token = document.getElementById(`cfg-token-${id}`).value.trim();
					}
					
					localStorage.setItem('notes_profiles', JSON.stringify(AppState.profiles));
					
					if (id === AppState.activeProfileId) AppState.config = c;
					UI.showStatus(`Saved config for ${AppState.profiles[id].name}`);
				},

				deleteProfile(id) {
					if (Object.keys(AppState.profiles).length <= 1) return alert("You cannot delete your only profile.");
					
					const profileName = AppState.profiles[id].name;
					const dbName = AppState.profiles[id].dbName;
					
					if (!confirm(`WARNING: Permanently delete profile "${profileName}" AND wipe all its local data?\n\nThis action cannot be undone.`)) return;

					// 1. Purge the isolated database directly from the browser's storage
					indexedDB.deleteDatabase(dbName);

					// 2. Remove the profile from memory
					delete AppState.profiles[id];
					localStorage.setItem('notes_profiles', JSON.stringify(AppState.profiles));

					// 3. UI Routing
					if (AppState.activeProfileId === id) {
						// Fallback to the first available profile if we deleted the active one
						const fallbackId = Object.keys(AppState.profiles)[0];
						this.switchProfile(fallbackId);
						this.configureGitHub(); // Re-open settings to show the updated list
					} else {
						// We deleted a background profile, just re-render the list
						UI.renderSettings();
					}
				},

				async openFile(filename, skipHistory = false) {
					const note = await DBService.get(filename);
					if (!note) return;
					
					// Push to the browser's History API
					if (!skipHistory) {
						history.pushState(null, null, '#' + encodeURIComponent(filename));
					}

					// If we are on a mobile device (screen width < 768px), auto-collapse the sidebar
					if (window.innerWidth < 768) {
					    DOM.sidebar.classList.add('collapsed');
					}

					UI.setEditorActive(filename, note.content);
					UI.renderFileList(DOM.searchBar.value, false);
				},

				async createFile() {
					let filename = prompt('Enter filename (e.g., folder/draft.txt):');
					if (!filename) return;
					if (!filename.includes('.')) filename += '.txt'; 

					if (await DBService.get(filename)) return alert('File already exists locally.');

					await DBService.put({ filename, content: '', last_synced_sha: null, remote_sha: null, is_dirty: true });
					AppState.syncChannel.postMessage({ type: 'SIDEBAR_REFRESH' });
					this.openFile(filename);
				},

				async handleFileUpload(event) {
					const file = event.target.files[0];
					if (!file) return;

					event.target.value = '';

					// Hard limit: 5MB to protect browser memory and API limits
					if (file.size > 5 * 1024 * 1024) {
						return UI.showStatus('File is too large. Limit is 5MB.', true);
					}

					let filename = prompt('Confirm or rename file path (e.g., archive.zip):', file.name);
					if (!filename) return;

					const existing = await DBService.get(filename);
					if (existing && !confirm(`Overwrite existing local file "${filename}"?`)) return;

					// FIX: Treat anything that isn't explicitly text as a binary Blob
					const isText = Utils.isTextFile(filename);
					let content;

					if (!isText) {
						// Fallback to octet-stream for generic unknown files
						content = new Blob([file], { type: file.type || 'application/octet-stream' });
					} else {
						content = await file.text();
					}

					await DBService.put({
						filename,
						content,
						last_synced_sha: existing ? existing.last_synced_sha : null,
						remote_sha: existing ? existing.remote_sha : null,
						is_dirty: true 
					});

					UI.showStatus(`Successfully imported ${filename}.`);
					AppState.syncChannel.postMessage({ type: 'SIDEBAR_REFRESH' });
					this.openFile(filename);
				},
				linkDropbox(id) {
					const key = document.getElementById(`cfg-dbx-key-${id}`).value.trim();
					if (!key) return alert("Please enter your App Key first.");
					
					// Opens the Dropbox approval page asking for offline access
					const authUrl = `https://www.dropbox.com/oauth2/authorize?client_id=${key}&response_type=code&token_access_type=offline`;
					window.open(authUrl, '_blank');
				},

				async exchangeDropboxCode(id) {
					const key = document.getElementById(`cfg-dbx-key-${id}`).value.trim();
					const secret = document.getElementById(`cfg-dbx-secret-${id}`).value.trim();
					const code = prompt("Paste the Authorization Code from Dropbox:");
					
					if (!code || !key || !secret) return alert("Missing Code, Key, or Secret.");

					UI.showStatus("Linking Dropbox...");
					try {
						const credentials = btoa(`${key}:${secret}`);
						const res = await fetch('https://api.dropboxapi.com/oauth2/token', {
							method: 'POST',
							headers: {
								'Content-Type': 'application/x-www-form-urlencoded',
								'Authorization': `Basic ${credentials}`
							},
							body: new URLSearchParams({ code: code, grant_type: 'authorization_code' })
						});

						const data = await res.json();
						if (!res.ok) throw new Error(data.error_description || "Auth failed");

						// Save everything to the profile
						const profile = AppState.profiles[id];
						profile.config.provider = 'dropbox';
						profile.config.appKey = key;
						profile.config.appSecret = secret;
						profile.config.token = data.access_token;
						profile.config.refreshToken = data.refresh_token; // The holy grail
						
						localStorage.setItem('notes_profiles', JSON.stringify(AppState.profiles));
						if (id === AppState.activeProfileId) AppState.config = profile.config;
						
						UI.showStatus("Dropbox linked successfully! You never have to do this again.");
						UI.renderSettings(); // Refresh UI
					} catch (err) {
						UI.showStatus(`Linking failed: ${err.message}`, true);
					}
				},
				handleTyping() {
					if (!AppState.currentFilename) return;
					clearTimeout(AppState.typingTimer);

					AppState.typingTimer = setTimeout(async () => {
						const note = await DBService.get(AppState.currentFilename);
						if (note) {
							note.content = DOM.editor.value;
							note.is_dirty = true;
							await DBService.put(note);

							AppState.syncChannel.postMessage({ type: 'LOCAL_EDIT', filename: AppState.currentFilename });
							UI.renderFileList(DOM.searchBar.value, false);
						}
					}, 500); 
				},

				async clearDB() {
					if (!confirm('WARNING: Permanently delete ALL local notes?')) return;
					try {
						await DBService.clear();
						UI.resetEditor();
						history.replaceState(null, null, window.location.pathname);
						UI.renderFileList();
						AppState.syncChannel.postMessage({ type: 'SIDEBAR_REFRESH' });
						UI.showStatus('Local database completely cleared.');
					} catch(err) {
						UI.showStatus('Failed to clear local database.', true);
					}
				},

				async deleteFile() {
					const filename = AppState.currentFilename;
					if (!filename) return;
					const note = await DBService.get(filename);
					if (!note) return;

					const msg = note.last_synced_sha ? `Delete ${filename} from local AND GitHub?` : `Delete ${filename} locally?`;
					if (!confirm(msg)) return;

					try {
						if (note.last_synced_sha) {
							UI.showStatus(`Deleting ${filename} remotely...`);
							await SyncService.deleteFile(filename, note.last_synced_sha);
						}
						await DBService.delete(filename);
						UI.resetEditor();
						history.replaceState(null, null, window.location.pathname);
						AppState.syncChannel.postMessage({ type: 'SIDEBAR_REFRESH' });
						UI.renderFileList();
						UI.showStatus('File deleted successfully.');
					} catch (err) {
						UI.showStatus(`Error: ${err.message}`, true);
					}
				},

				async refreshTree() {
					try {
						UI.showStatus('Refreshing file list remotely...');
						const treeData = await SyncService.getTree();

						// Show ALL files in the sidebar, regardless of type or size
						const files = treeData.tree.filter(item => item.type === 'blob');

						for (const file of files) {
							let localNote = await DBService.get(file.path);
							if (!localNote) {
								await DBService.put({ filename: file.path, content: '', last_synced_sha: null, remote_sha: file.sha, is_dirty: false });
							} else {
								localNote.remote_sha = file.sha;
								await DBService.put(localNote);
							}
						}
						UI.showStatus('File list updated.');
						AppState.syncChannel.postMessage({ type: 'SIDEBAR_REFRESH' });
						UI.renderFileList(DOM.searchBar.value, false);
					} catch (err) {
						UI.showStatus(`Refresh failed: ${err.message}`, true);
					}
				},
				async pullFile() {
					const filename = AppState.currentFilename;
					if (!filename) return;

					try {
						let localNote = await DBService.get(filename);

						UI.showStatus(`Pulling ${filename}...`);
						
						const isBinary = Utils.isImageFile(filename) || Utils.isPdfFile(filename);
						
						// 3. Proceed with the network request
						const fileResponse = await SyncService.getFile(filename);

						// Fallback initialization just in case the file wasn't in IndexedDB yet
						if (!localNote) {
							localNote = { filename, content: '', last_synced_sha: null, remote_sha: null, is_dirty: false };
						}

						if (isBinary) {
							// Binary Handling (Blobs)
							localNote.content = fileResponse; // fileResponse is a raw Blob here
							localNote.is_dirty = false;
							localNote.last_synced_sha = localNote.remote_sha; // Use the known SHA from the tree
						} else {
							// Text Handling (Base64 Strings)
							const remoteContent = Utils.atou(fileResponse.content);
							if (localNote.is_dirty && localNote.content !== remoteContent) {
								const choice = prompt(`Conflict in ${filename}!\nd: Insert Diff markers\nw: Overwrite local with remote`, "d");
								if (choice === null) return UI.showStatus("Pull cancelled.");

								if (choice === "w") {
									localNote.content = remoteContent;
									localNote.is_dirty = false;
								} else {
									UI.showStatus(`Injecting merge markers...`, true);
									if (typeof Diff !== 'undefined') {
										let merged = "";
										Diff.diffLines(remoteContent, localNote.content).forEach(p => {
											if (p.added) merged += `<<<<<<< LOCAL\n${p.value}=======\n`;
											else if (p.removed) merged += `${p.value}>>>>>>> REMOTE\n`;
											else merged += p.value;
										});
										localNote.content = merged;
									} else {
										localNote.content = `<<<<<<< LOCAL\n${localNote.content}\n=======\n${remoteContent}\n>>>>>>> REMOTE`;
									}
									localNote.is_dirty = true; 
								}
							} else {
								localNote.content = remoteContent;
								localNote.is_dirty = false;
							}
							localNote.last_synced_sha = fileResponse.sha;
							localNote.remote_sha = fileResponse.sha;
						}

						await DBService.put(localNote);
						UI.setEditorActive(filename, localNote.content);
						UI.showStatus(`Successfully pulled ${filename}.`);
						AppState.syncChannel.postMessage({ type: 'SIDEBAR_REFRESH' });
						UI.renderFileList(DOM.searchBar.value, false);
					} catch (err) {
						UI.showStatus(`Pull failed: ${err.message}`, true);
					}
				},
async pushFile() {
					const filename = AppState.currentFilename;
					if (!filename) return;

					try {
						const note = await DBService.get(filename);
						if (!note || !note.is_dirty) return UI.showStatus(`${filename} is already up to date.`);

						UI.showStatus(`Pushing ${filename}...`);
						
						let base64Content;
						
						// THE INESCAPABLE NET: If it is an object (Blob, File, or stripped IDB object), it is binary.
						if (typeof note.content === 'object' && note.content !== null) {
							
							// Force extraction via Response wrapper (bypasses missing prototype methods)
							const buffer = await new Response(note.content).arrayBuffer();
							const bytes = new Uint8Array(buffer);
							
							// Encode in chunks to prevent memory limits
							let binary = '';
							const chunkSize = 8192;
							for (let i = 0; i < bytes.length; i += chunkSize) {
								binary += String.fromCharCode.apply(null, bytes.subarray(i, i + chunkSize));
							}
							base64Content = btoa(binary);
							
						} else {
							// It is strictly text.
							base64Content = Utils.utoa(String(note.content));
						}

						const responseData = await SyncService.putFile(filename, base64Content, note.last_synced_sha);

						note.last_synced_sha = responseData.content.sha;
						note.remote_sha = responseData.content.sha;
						note.is_dirty = false;
						await DBService.put(note);

						UI.showStatus(`Successfully pushed ${filename}.`);
						AppState.syncChannel.postMessage({ type: 'SIDEBAR_REFRESH' });
						UI.renderFileList(DOM.searchBar.value, false);
					} catch (err) {
						UI.showStatus(`Push error: ${err.message}`, true);
					}
				},
				
				addPin() {
					const pin = prompt('Enter a filename or directory path to pin (e.g., docs/ or README.md):',
						AppState.currentFilename || '');
					if (!pin) return;
					
					if (!AppState.pins.includes(pin)) {
						AppState.pins.push(pin);
						this.saveProfile(); // <--- Changed
						UI.renderPins();
					}
				},
				
				removePin(pin, event) {
					event.stopPropagation();
					AppState.pins = AppState.pins.filter(p => p !== pin);
					this.saveProfile(); // <--- Changed
					UI.renderPins();
				},
				
				async handlePinClick(pin) {
				    const note = await DBService.get(pin);
				    
				    if (note) {
				        // Route A: Exact file exists. Open it normally.
				        this.openFile(pin);
				    } else {
				        // Route B: It's a directory (or missing file). Inject into search bar.
				        DOM.searchBar.value = pin;
				        UI.renderFileList(pin, false);
				    }
				},

				toggleViewMode() {
					if (!AppState.currentFilename
									|| Utils.isImageFile(AppState.currentFilename)
									|| Utils.isPdfFile(AppState.currentFilename)) return;

					AppState.isViewMode = !AppState.isViewMode;

					if (AppState.isViewMode) {
						this.renderPreview();
						DOM.editor.style.display = 'none';
						DOM.viewer.style.display = 'block';
						DOM.viewToggle.innerText = '✏️'; 
					} else {
						DOM.viewer.style.display = 'none';
						DOM.editor.style.display = 'block';
						DOM.editor.focus();
						DOM.viewToggle.innerText = '👁️'; 
					}
				},

				renderPreview() {
					const rawText = DOM.editor.value;
					const ext = AppState.currentFilename.split('.').pop().toLowerCase();
					const isMarkdown = ext === 'md' || ext === 'markdown';

					// 1. Render HTML
					if (isMarkdown && typeof marked !== 'undefined') {
						DOM.viewer.innerHTML = marked.parse(rawText);
					} else {
						const escaped = rawText.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
						DOM.viewer.innerHTML = `<pre><code class="language-${ext}">${escaped}</code></pre>`;
					}

					// 2. Syntax Highlighting
					if (typeof hljs !== 'undefined') {
						DOM.viewer.querySelectorAll('pre code').forEach(block => hljs.highlightElement(block));
					}

						// 3. Post-Process Local Images
					DOM.viewer.querySelectorAll('img').forEach(async (img) => {
						const src = img.getAttribute('src');
						if (src && !src.match(/^(http|https|data:)/i)) {
							const targetPath = Utils.resolvePath(AppState.currentFilename, src);
							const file = await DBService.get(targetPath);

							if (file && file.content instanceof Blob) {
								const objectUrl = URL.createObjectURL(file.content);
								img.src = objectUrl;
								// Browsers keep object URLs in memory until told otherwise. Clean it up.
								img.onload = () => URL.revokeObjectURL(objectUrl); 
							}
						}
					});
				}
			};

			/* =====================================================================
			   8. EVENT LISTENERS & INITIALIZATION
			===================================================================== */
			AppState.syncChannel.onmessage = (event) => {
				if (event.data.type === 'SIDEBAR_REFRESH') UI.renderFileList();
				if (event.data.type === 'LOCAL_EDIT' && AppState.currentFilename === event.data.filename) {
					if (!DOM.editor.disabled) {
						DOM.editor.disabled = true;
						DOM.editor.style.opacity = '0.7';
						DOM.pullBtn.disabled = true;
						DOM.pushBtn.disabled = true;
						UI.showStatus(`⚠️ Edited in another tab. <button onclick="Actions.openFile('${AppState.currentFilename}')">Reload</button>`, true);
					}
				}
			};

			window.onload = () => {
				if (typeof marked !== 'undefined' && typeof window.markedKatex !== 'undefined') {
					marked.use(window.markedKatex({
						throwOnError: false, // Prevents a syntax error from crashing the whole render loop
						output: 'html'       // Renders pure HTML to avoid needing extra font logic
					}));
				}

				initDOM();

				// Hydrate the active context BEFORE attempting to load any files
				Actions.switchProfile(AppState.activeProfileId);

				// 1. Deep Link Boot Sequence
				const hash = window.location.hash.substring(1);
				if (hash) {
					// Boot directly into the requested file
					Actions.openFile(decodeURIComponent(hash), true);
				} else {
					// Boot into the empty state
					UI.resetEditor();
					UI.renderFileList();
				}

				// 2. Wire up search bar events locally
				DOM.searchBar.addEventListener('input', () => UI.renderFileList(DOM.searchBar.value, false));
				DOM.searchBar.addEventListener('keydown', (e) => {
if (e.key === 'Enter') {
						e.preventDefault();
						UI.renderFileList(DOM.searchBar.value, true);
					}
				});

				// 3. Editor typing event
				DOM.editor.addEventListener('input', () => Actions.handleTyping());

				DOM.editor.addEventListener('keydown', function(e) {
				    if (e.key === 'Tab') {
				        e.preventDefault(); // Stop focus from moving
				        
				        const start = this.selectionStart;
				        const end = this.selectionEnd;
				        const indent = "    "; // 4 spaces (or use "\t" for a real tab)
				        
				        // Inject the indent
				        this.value = this.value.substring(0, start) + indent + this.value.substring(end);
				        
				        // Move the cursor to right after the injected indent
				        this.selectionStart = this.selectionEnd = start + indent.length;
				        
				        // Trigger the debounced save manually since 'input' event doesn't fire on script-injected text
				        Actions.handleTyping();
				    }
				});

				DOM.viewer.addEventListener('click', (e) => {
					let target = e.target;
					while (target && target.tagName !== 'A') target = target.parentNode;
					
					if (target && target.tagName === 'A') {
						const href = target.getAttribute('href');
						
						if (href && !href.match(/^(http|https|mailto:|data:|#)/i)) {
							e.preventDefault(); 
							
							// mdbook links often include anchors (e.g., chapter.html#section-1)
							// We must strip the hash before looking up the actual filename
							const pathWithoutHash = href.split('#')[0];
							const targetPath = Utils.resolvePath(AppState.currentFilename, pathWithoutHash);
							
							// Clear the search bar so we don't accidentally filter the tree
							DOM.searchBar.value = ''; 
							
							(async () => {
								let finalPath = targetPath;
								let note = await DBService.get(finalPath);

								if (!note) {
									// 1. Fetch all known filenames (fast, keys only)
									const allKeys = await DBService.getAllKeys();
									
									// 2. Parse the target path using our utility
									const target = Utils.parsePath(targetPath);

									// 3. Find files in the SAME directory with the SAME basename
									const candidates = allKeys.filter(key => {
										const k = Utils.parsePath(key);
										return k.dir === target.dir && k.basename === target.basename && key !== targetPath;
									});

									// 4. Resolve routing IF AND ONLY IF there is exactly one match
									if (candidates.length === 1) {
										finalPath = candidates[0];
										note = await DBService.get(finalPath);
										UI.showStatus(`Rerouted: ${target.filename} &rarr; ${Utils.parsePath(finalPath).filename}`);
									}
								}

								if (note) {
									Actions.openFile(finalPath);
								} else {
									UI.showStatus(`The file "${targetPath}" does not exist locally.`, true);
								}
							})();
						}
					}
				});
			};

			window.addEventListener('popstate', () => {
				// Read the hash from the URL (removing the # symbol)
				const hash = window.location.hash.substring(1);
				
				if (hash) {
					// The user navigated Back/Forward to a specific file
					Actions.openFile(decodeURIComponent(hash), true); // true = skip pushing state again
				} else {
					// The URL hash is empty. The user navigated Back to the root list.
					UI.resetEditor();
					UI.renderFileList(DOM.searchBar.value, false);
				}
			});

			window.addEventListener('offline', () => UI.showStatus('📴 You are offline. Changes will save locally.', true));
			window.addEventListener('online', () => UI.showStatus('📶 You are back online. Safe to Push/Pull.'));

			document.addEventListener('keydown', (e) => {
				if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 's') {
					e.preventDefault();
					AppState.currentFilename ? Actions.pushFile() : UI.showStatus("No file open to push.", true);
				}
				if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'k') {
					e.preventDefault();
					DOM.searchBar.focus();
					DOM.searchBar.select();
				}
				if (e.altKey && e.key === 'ArrowDown') {
					e.preventDefault();
					AppState.currentFilename ? Actions.pullFile() : UI.showStatus("No file open to pull.", true);
				}
				if (e.altKey && e.key.toLowerCase() === 'r') {
					e.preventDefault();
					Actions.refreshTree();
				}
			});

			document.addEventListener('paste', async (e) => {
				// STRICT GEDIT PHILOSOPHY: Do not intercept pastes inside the text editor.
				// Only allow pasting when focusing outside the editor (e.g., the sidebar).
				if (e.target.id === 'note-content' || e.target.tagName === 'INPUT') return;

				const clipboardData = e.clipboardData || window.clipboardData;
				const items = clipboardData.items;
				
				for (let i = 0; i < items.length; i++) {
					const item = items[i];
					
					if (item.type.indexOf('image') !== -1) {
						e.preventDefault(); 
						
						const blob = item.getAsFile();
						if (!blob) continue;

						const ext = blob.type.split('/')[1] || 'png';
						let filename = prompt('Upload image directly to repository:', `images/image.${ext}`);
						
						if (!filename) {
							UI.showStatus('Image upload cancelled.');
							return; 
						}

						if (!filename.includes('.')) filename += `.${ext}`;

						UI.showStatus(`Saving ${filename}...`);

						await DBService.put({
							filename: filename,
							content: blob,
							last_synced_sha: null,
							remote_sha: null,
							is_dirty: true 
						});

						// Only update the file tree, do not touch the editor
						AppState.syncChannel.postMessage({ type: 'SIDEBAR_REFRESH' });
						UI.showStatus(`Successfully saved ${filename}.`);
						
						break; 
					}
				}
			});
		</script>
	</body>
</html>
